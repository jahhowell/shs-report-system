<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Report</title>
    <link rel="stylesheet" href="style.css">

<style>
.track-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0}
.info-box{background:#f8fafc;padding:12px;border-radius:10px}
.timeline{border-left:3px solid #cbd5e1;padding-left:16px;margin-top:12px}
.timeline-item{margin-bottom:12px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:10px}
.photo-grid img{width:100%;height:120px;object-fit:cover;border-radius:8px;border:1px solid #ddd}
.copy-btn{margin-top:12px}

.report-hero{
position:relative;
background-color:#07294d;
background-image:linear-gradient(rgba(7,41,77,.78),rgba(7,41,77,.92)),url('assets/hero.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#fff;
padding:80px 20px;
text-align:center;
min-height:340px;
display:flex;
flex-direction:column;
justify-content:center;
margin-bottom:40px;
}
.report-hero h1{font-size:36px;font-weight:700;margin:0 0 8px}
.report-hero p{max-width:600px;margin:0 auto;color:rgba(255,255,255,.88)}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:14px;color:#666;margin-bottom:24px}

</style>

</head>
<body>
<nav>
    <a class="nav-logo" href="index.html">
        <picture>
            <source srcset="assets/crest.png" type="image/png">
            <img class="crest" src="assets/crest.svg" alt="SHS crest" />
        </picture>
        <div style="line-height:1; margin-left:8px">
            <div style="font-weight:700">Sacred Heart School</div>
            <div style="font-size:12px; color:var(--muted);">Ateneo de Cebu</div>
        </div>
    </a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="report.html">Submit report</a>
        <a href="track.html" class="active">Track report</a>
        <a href="admin-login.html">Admin</a>
    </div>
</nav>
    <div class="page-wrap" >
        


<div class="report-hero">
  <h1>Track Your Report</h1>
  <p>Check the status of your facility maintenance request using your Report ID.</p>
</div>

<div class="page-title">Track your report</div>
<div class="page-sub">Sacred Heart School – Ateneo de Cebu</div>



        
        <div class="card" style="max-width:720px;margin:auto;">
            <form id="track-form">
                <div class="form-group">
                    <label class="form-label">Report ID</label>
                    <input
                        id="reportId"
                        placeholder="Example: 6A3F8D219B2C" />
                </div>
                
                <button class="btn btn-primary" type="submit">
                    Track
                </button>
            </form>
            
            <div id="result" style="margin-top:20px"></div>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase.js";
        import {
            collection,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const form = document.getElementById("track-form");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const id = document.getElementById("reportId").value.trim();
            const result = document.getElementById("result");

            result.innerHTML = "Searching...";

            const snapshot = await getDocs(collection(db, "reports"));

            let found = false;

            snapshot.forEach(doc => {
                if(doc.id.slice(0, 12).toUpperCase() === id.toUpperCase()) {
                    const data = doc.data();

                                        const statusClass = (s=>{
                                            if(!s) return 'badge-pending';
                                            const key = s.toLowerCase();
                                            if(key.includes('progress')) return 'badge-progress';
                                            if(key.includes('resolved')) return 'badge-resolved';
                                            if(key.includes('reject')) return 'badge-rejected';
                                            return 'badge-pending';
                                        })(data.status);

                                        result.innerHTML = `
                                        <div class="card">
                                                <h3>Report Found</h3>


<div class="info-grid">
<div class="info-box"><strong>Status</strong><br>${data.status}</div>
<div class="info-box"><strong>Location</strong><br>${data.location}</div>
<div class="info-box"><strong>Category</strong><br>${data.category}</div>
<div class="info-box"><strong>Submitted</strong><br>${data.createdAt?.toDate ? data.createdAt.toDate().toLocaleString() : 'Unknown'}</div>
</div>

<h4>Progress Timeline</h4>
<div class="timeline">
${(data.history || []).map(h =>
`<div class="timeline-item">
<strong>${h.status}</strong><br>
<span style="font-size:13px;color:#64748b">${h.time}</span>
</div>`).join('')}
</div>

<h4 style="margin-top:20px">Resolution Notes</h4>
<p>${data.resolution || 'No resolution details available yet.'}</p>

${data.photos?.length ? `
<h4 style="margin-top:20px">Photos</h4>
<div class="photo-grid">
${data.photos.map(p=>`<img src="${p.url || p.data || p}">`).join('')}
</div>` : ''}

<button class="btn btn-outline copy-btn"
onclick="navigator.clipboard.writeText('${id}')">
Copy Report ID
</button>

<button class="btn btn-outline"
onclick="location.reload()">
Search Another Report
</button>


</div>
                                        `;

                    found = true;
                }
            });

            if(!found) {
                result.innerHTML = `
                <div class="alert alert-error" style="display:block">
                Report not found.
                </div>
                `;
            }
        });
    </script>
</body>
</html>
