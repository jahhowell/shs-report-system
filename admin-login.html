
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#f4f6fb; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .page-wrap{ width:100%; max-width:420px; padding:20px; }
        .card{ background:#fff; border-radius:12px; padding:28px; box-shadow:0 6px 18px rgba(20,30,60,0.08); text-align:center; }
        .logo{ width:64px; height:64px; border-radius:12px; background:#e8f0ff; color:#1a73e8; display:flex; align-items:center; justify-content:center; font-weight:700; margin:0 auto 12px; font-size:20px; }
        h2{ margin:0 0 12px; font-size:20px; }
        .form-group{ margin-bottom:14px; text-align:left; }
        .form-group label{ display:block; font-weight:600; margin-bottom:6px; color:#333; }
        input[type="text"], input[type="password"]{ width:100%; padding:10px 12px; border:1px solid #e6e9f2; border-radius:8px; font-size:15px; outline:none; transition:box-shadow .15s, border-color .15s; }
        input:focus{ border-color:#4f8ef7; box-shadow:0 6px 12px rgba(79,142,247,0.08); }
        .btn{ display:inline-block; width:100%; padding:12px; border-radius:10px; border:none; background:#1a73e8; color:#fff; font-weight:700; cursor:pointer; font-size:15px; }
        .footer-note{ font-size:13px; color:#666; margin-top:12px; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="card">
                        <div class="logo">
                            <picture>
                                <source srcset="assets/crest.png" type="image/png">
                                <img src="assets/crest.svg" alt="SHS crest" style="width:64px;height:64px;border-radius:12px;object-fit:cover;"/>
                            </picture>
                        </div>
            <h2>Admin Login</h2>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="admin" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="test123" />
            </div>

            <button class="btn" onclick="login()">Sign in</button>

            <div class="footer-note">Test credentials — <strong>admin</strong> / <strong>test123</strong></div>
        </div>
    </div>

    <script>
        function login(){
            const username = document.getElementById('username').value;
            const pw = document.getElementById('password').value;
            if(username === 'admin' && pw === 'test123'){
                localStorage.setItem('adminLoggedIn','true');
                location.href = 'admin.html';
            } else {
                alert('Incorrect username or password');
            }
        }
    </script>
<script src="ui.js"></script>
</body>
</html>
